networks:
  rain-net:
    driver: bridge

volumes:
  storage-1-data:
  storage-2-data:
  storage-3-data:

services:
  witness-node:
    build:
      context: .
      dockerfile: Dockerfile.witness
    container_name: raindrops-witness
    ports:
      - "9080:8080"
    environment:
      - WITNESS_PORT=8080
      - STORAGE_URLS=http://keeper-1:8080,http://keeper-2:8080,http://keeper-3:8080
      - API_KEY=${API_KEY:-}
    networks:
      rain-net:
        aliases:
          - witness
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  storage-node-1:
    build:
      context: .
      dockerfile: Dockerfile.storage
    container_name: raindrops-storage-1
    ports:
      - "9081:8080"
    environment:
      - NODE_ID=keeper-1
      - PEER_URLS=http://keeper-2:8080,http://keeper-3:8080
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/storage-db;DB_CLOSE_DELAY=-1
      - API_KEY=${API_KEY:-}
    volumes:
      - storage-1-data:/app/data
    networks:
      rain-net:
        aliases:
          - keeper-1
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  storage-node-2:
    build:
      context: .
      dockerfile: Dockerfile.storage
    container_name: raindrops-storage-2
    ports:
      - "9082:8080"
    environment:
      - NODE_ID=keeper-2
      - PEER_URLS=http://keeper-1:8080,http://keeper-3:8080
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/storage-db;DB_CLOSE_DELAY=-1
      - API_KEY=${API_KEY:-}
    volumes:
      - storage-2-data:/app/data
    networks:
      rain-net:
        aliases:
          - keeper-2
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  storage-node-3:
    build:
      context: .
      dockerfile: Dockerfile.storage
    container_name: raindrops-storage-3
    ports:
      - "9083:8080"
    environment:
      - NODE_ID=keeper-3
      - PEER_URLS=http://keeper-1:8080,http://keeper-2:8080
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/storage-db;DB_CLOSE_DELAY=-1
      - API_KEY=${API_KEY:-}
    volumes:
      - storage-3-data:/app/data
    networks:
      rain-net:
        aliases:
          - keeper-3
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  docs:
    image: nginx:alpine
    container_name: raindrops-docs
    ports:
      - "8089:80"
    volumes:
      - ./docs:/usr/share/nginx/html:ro
      - ./docs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: wget -qO- http://localhost:80/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
