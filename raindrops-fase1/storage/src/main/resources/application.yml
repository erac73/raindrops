server:
  port: ${STORAGE_PORT:8080}

spring:
  datasource:
    url: jdbc:h2:file:./data/raindrops-storage;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: raindrops-storage

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: Rain Drops Storage API
    version: 0.1.0

peers:
  urls: ${PEER_URLS:}

logging:
  level:
    io.raindrops: INFO
    org.springframework: WARN
    org.hibernate: WARN