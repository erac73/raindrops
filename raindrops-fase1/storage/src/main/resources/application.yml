server:
  port: ${STORAGE_PORT:8080}

spring:
  datasource:
    url: jdbc:h2:file:./data/raindrops-storage;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

logging:
  level:
    io.raindrops: INFO
    org.springframework: WARN
    org.hibernate: WARN
