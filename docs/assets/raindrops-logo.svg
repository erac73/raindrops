<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277BD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dropGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#01579B" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="#0D1117"/>
  <circle cx="200" cy="190" r="140" fill="none" stroke="#1A237E" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="190" r="110" fill="none" stroke="#1A237E" stroke-width="0.5" opacity="0.2"/>
  <path d="M200 50 C200 50, 280 160, 280 220
           C280 264, 244 300, 200 300
           C156 300, 120 264, 120 220
           C120 160, 200 50, 200 50 Z"
        fill="url(#dropGrad)" filter="url(#shadow)"/>
  <ellipse cx="170" cy="180" rx="25" ry="40" fill="white" opacity="0.15"
           transform="rotate(-20, 170, 180)"/>
  <line x1="170" y1="130" x2="230" y2="160" stroke="#80D8FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="160" x2="210" y2="240" stroke="#80D8FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="240" x2="160" y2="210" stroke="#80D8FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="210" x2="170" y2="130" stroke="#80D8FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="170" y1="130" x2="210" y2="240" stroke="#80D8FF" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="160" x2="160" y2="210" stroke="#80D8FF" stroke-width="1" opacity="0.3"/>
  <circle cx="170" cy="130" r="8" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="230" cy="160" r="8" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="210" cy="240" r="8" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="160" cy="210" r="8" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="195" cy="180" r="12" fill="none" stroke="#FFD740" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="195" cy="180" r="5" fill="#FFD740" filter="url(#glow)"/>
  <g opacity="0.15">
    <ellipse cx="80" cy="100" rx="40" ry="15" fill="#4FC3F7"/>
    <ellipse cx="110" cy="95" rx="30" ry="20" fill="#4FC3F7"/>
    <ellipse cx="130" cy="105" rx="25" ry="12" fill="#4FC3F7"/>
    <ellipse cx="290" cy="120" rx="35" ry="12" fill="#4FC3F7"/>
    <ellipse cx="320" cy="115" rx="25" ry="18" fill="#4FC3F7"/>
  </g>
  <text x="200" y="360" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="bold" fill="#E0E0E0" letter-spacing="4">
    RAIN DROPS
  </text>
  <text x="200" y="382" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#78909C" letter-spacing="6">
    CRYPTOGRAPHIC STORAGE
  </text>
  <line x1="120" y1="320" x2="280" y2="320" stroke="#1A237E" stroke-width="0.5" opacity="0.5"/>
</svg>
